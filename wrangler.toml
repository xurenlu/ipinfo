# Wrangler 配置文件
# Cloudflare Workers 部署配置

name = "ip-info-service"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 账户配置 (首次部署时会要求登录)
# account_id = "your-account-id"

# Workers 配置
[vars]
ENVIRONMENT = "production"

# 路由配置 (可选 - 如果要绑定到自定义域名)
# routes = [
#   { pattern = "ip.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# 定时触发器 (可选 - 用于定时任务)
# [triggers]
# crons = ["0 * * * *"]
